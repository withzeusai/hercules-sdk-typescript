name: Workflow security (zizmor)
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/zizmor.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/zizmor.yml'
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor==1.24.1

      - name: Run zizmor
        env:
          # Lets zizmor query the GitHub API for impostor-commit detection.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor --format sarif --min-severity low . > zizmor.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
