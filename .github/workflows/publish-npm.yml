# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to NPM in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/withzeusai/hercules-sdk-typescript/actions/workflows/publish-npm.yml
name: Publish NPM
on:
  workflow_dispatch:
    inputs:
      path:
        description: The path to run the release in, e.g. '.' or 'packages/mcp-server'
        required: true

  release:
    types: [published]

permissions: {}

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    # Gate publishes behind a deployment environment with required reviewers
    # configured in the repo's GitHub settings.
    environment: publish-npm
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Validate workflow_dispatch input
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_PATH: ${{ github.event.inputs.path }}
        run: |
          # Restrict the user-supplied path to a known allowlist to prevent
          # injection via the workflow_dispatch input.
          case "$INPUT_PATH" in
            "." | "packages/mcp-server")
              ;;
            *)
              echo "ERROR: path input must be one of: '.', 'packages/mcp-server'" >&2
              exit 1
              ;;
          esac

      - name: Publish to NPM
        env:
          INPUT_PATH: ${{ github.event.inputs.path }}
        run: |
          if [ -n "$INPUT_PATH" ]; then
            PATHS_RELEASED="[\"$INPUT_PATH\"]"
          else
            PATHS_RELEASED='[".", "packages/mcp-server"]'
          fi
          pnpm tsn scripts/publish-packages.ts "{ \"paths_released\": $(printf '%s' "$PATHS_RELEASED" | jq -Rs .) }"

      - name: Upload MCP Server DXT GitHub release asset
        if: github.event_name == 'release'
        run: |
          gh release upload "$RELEASE_TAG" \
            packages/mcp-server/usehercules_sdk_api.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
